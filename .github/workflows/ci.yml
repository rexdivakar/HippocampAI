name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  test:
    name: Test and Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      qdrant:
        image: qdrant/qdrant:v1.15.1
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -sf http://localhost:6333/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955   # v4.3.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830       # v4.3.0
        with:
          path: |
            ~/.cache/pip
            ${{ env.pythonLocation }}
          key: ${{ runner.os }}-python-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,api]'

      - name: Ruff lint
        run: pip install ruff && ruff check . --output-format=github

      - name: Ruff format (warn only)
        run: |
          if ! ruff format . --check; then
            echo "::warning ::Some files would be reformatted by Ruff"
          fi

      - name: Bandit Security Scan
        run: |
          pip install bandit
          if ! bandit -r src -lll; then
            echo "::warning ::Bandit found potential security issues (review above)"
          fi

      - name: Run unit tests
        run: pytest tests/ -m "not integration" -x --timeout=60 -q
        env:
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379
          AUTH_ENABLED: "false"
          USER_AUTH_ENABLED: "false"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955   # v4.3.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Cache Python dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830       # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-build-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-build-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,api]'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Validate build with Twine
        run: twine check dist/*
