# Alembic configuration for HippocampAI PostgreSQL schema migrations.
# Uses asyncpg driver via SQLAlchemy async engine.
#
# Running migrations:
#   alembic upgrade head            # apply all pending migrations
#   alembic downgrade -1            # roll back one migration
#   alembic revision -m "add_xyz"   # create a new migration script
#   alembic current                 # show current revision
#   alembic history                 # list all revisions
#
# The DATABASE_URL env var overrides sqlalchemy.url at runtime.
# Format: postgresql+asyncpg://user:pass@host:port/db

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

# Overridden at runtime from DATABASE_URL if set — see alembic/env.py
sqlalchemy.url = postgresql+asyncpg://hippocampai:hippocampai_secret@localhost:5432/hippocampai

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
