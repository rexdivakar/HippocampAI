# Alembic configuration for HippocampAI database migrations.
# Supports both SQLite (default, development) and PostgreSQL (production).
#
# Running migrations:
#   alembic upgrade head            # apply all pending migrations
#   alembic downgrade -1            # roll back one migration
#   alembic revision -m "add_xyz"   # create a new migration script
#   alembic current                 # show current revision
#   alembic history                 # list all revisions
#
# The database URL is constructed at runtime by env.py from DB_TYPE and
# related env vars (SQLITE_PATH, POSTGRES_HOST, POSTGRES_PORT, etc.).
# DB_TYPE defaults to "sqlite".

[alembic]
script_location = src/hippocampai/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = src

# Placeholder — env.py overrides this at runtime from env vars.
# Do not set a real URL here; keep credentials out of source control.
sqlalchemy.url = sqlite:///data/hippocampai_auth.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
